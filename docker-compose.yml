# compose 编排说明：
# - db: PostgreSQL 服务，持久化到 postgres_data
# - web: Next.js 生产服务（Dockerfile 的 runner 阶段）
# - migrate: 一次性迁移服务（Dockerfile 的 builder 阶段，内含 prisma CLI）
#
# 执行顺序（由 deploy.sh 控制）：
# 1) up db
# 2) run migrate
# 3) up web
#
# Redis 不映射宿主机端口：web 通过 REDIS_URL=redis://redis:6379 走 Docker 网络；
# 避免与 VPS/本机已在 6379 监听的进程冲突。本机 npm run dev 见 docker-compose.dev.yml。

services:
  db:
    image: postgres:16-alpine
    container_name: personal-system-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_system}']
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: personal-system-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: personal-system-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-personal_system}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - '3000:3000'

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-personal_system}?schema=public
      REDIS_URL: redis://redis:6379
    # 只执行迁移，不常驻
    command: ['npm', 'run', 'db:deploy']
    restart: 'no'

volumes:
  postgres_data:
  redis_data:
