services:
  db:
    image: postgres:16-alpine
    container_name: personal-system-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_system}']
      interval: 5s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: personal-system-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-personal_system}?schema=public
      NODE_ENV: production
    ports:
      - '3000:3000'

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-personal_system}?schema=public
    command: ['npm', 'run', 'db:deploy']
    restart: 'no'

volumes:
  postgres_data:
